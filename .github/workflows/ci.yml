name: CI — Lint + Test

on:
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend — Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
        working-directory: backend

      - name: Lint with ruff
        run: ruff check backend/
        working-directory: .

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing
        working-directory: .
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: placeholder_key_for_tests
          ODDS_API_KEY: placeholder_odds_key
          OPENWEATHER_API_KEY: placeholder_weather_key
          ENV: test

  frontend-test:
    name: Frontend — Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://guerillagenics-core-engine-391532873800.us-west1.run.app
